<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compte à Rebours</title>
    <style>
        /* Style du site */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #00d4ff;
        }

        .countdown {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
        }

        .number {
            font-size: 3.5rem;
            font-weight: bold;
            background: #333;
            padding: 10px 20px;
            border-radius: 10px;
            min-width: 80px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .label {
            margin-top: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #aaa;
        }

        #message {
            margin-top: 2rem;
            font-size: 1.5rem;
            color: #ff4757;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Objectif : 29 Mars 2026 à 18:00 (GMT+1)</h1>
        
        <div class="countdown">
            <div class="time-segment">
                <div class="number" id="days">00</div>
                <div class="label">Jours</div>
            </div>
            <div class="time-segment">
                <div class="number" id="hours">00</div>
                <div class="label">Heures</div>
            </div>
            <div class="time-segment">
                <div class="number" id="minutes">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="time-segment">
                <div class="number" id="seconds">00</div>
                <div class="label">Secondes</div>
            </div>
        </div>

        <div id="message">Le décompte est terminé !</div>
    </div>

    <script>
        // Configuration de la date cible : 29 Mars 2026, 18:00:00
        // Le format ISO avec "Z" ou le décalage permet de gérer le fuseau horaire.
        // Pour GMT+1 (heure d'hiver en France), on utilise le format ci-dessous :
        const targetDate = new Date("2026-03-29T18:00:00+01:00").getTime();

        const countdownFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Calculs pour les jours, heures, minutes et secondes
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Affichage des résultats
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // Si le décompte est fini
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.querySelector(".countdown").style.display = "none";
                document.getElementById("message").style.display = "block";
            }
        }, 1000);
    </script>

</body>
</html>
